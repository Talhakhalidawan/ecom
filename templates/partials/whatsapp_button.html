{% if platform_settings.whatsapp %}
<div class="fixed bottom-8 right-8 z-[999] animate-fade-in-up">
    <a href="https://wa.me/{{ platform_settings.whatsapp|cut:' ' }}" 
       target="_blank" 
       rel="noopener noreferrer"
       class="group relative flex items-center justify-center w-16 h-16 bg-[#25D366] text-white rounded-full shadow-[0_10px_25px_-5px_rgba(37,211,102,0.4)] hover:shadow-[0_15px_30px_-5px_rgba(37,211,102,0.6)] transition-all duration-500 hover:-translate-y-1 active:scale-95"
       aria-label="Contact us on WhatsApp">
        
        <!-- Pulse Effect -->
        <span class="absolute inset-0 rounded-full bg-[#25D366] opacity-40 animate-ping-slow"></span>
        
        <!-- Icon -->
        <i class="fab fa-whatsapp text-3xl relative z-10"></i>

        <!-- Tooltip (Shows on Hover) -->
        <span class="absolute right-full mr-4 px-4 py-2 bg-black text-white text-[11px] tracking-[2px] uppercase whitespace-nowrap opacity-0 scale-95 group-hover:opacity-100 group-hover:scale-100 transition-all duration-300 rounded-sm pointer-events-none shadow-xl">
            Scent Consultation
        </span>
    </a>
</div>

<style>
    @keyframes pulse-slow {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.15); opacity: 0.2; }
    }
    .animate-ping-slow {
        animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
        animation: fade-in-up 1s ease-out forwards;
    }
</style>
{% endif %}
